<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AI Background Remover</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #333; margin-bottom: 20px; }
        .upload-box {
            display: block;
            border: 2px dashed #4F46E5;
            padding: 30px 20px;
            border-radius: 8px;
            background: #F5F3FF;
            cursor: pointer;
            margin-bottom: 20px;
        }
        input[type="file"] { display: none; }
        button {
            background: #4F46E5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:hover { background: #4338CA; }
        #loading { display: none; color: #4F46E5; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Advanced AI Background Remover</h2>
    <form action="/upload" method="post" enctype="multipart/form-data" id="uploadForm">
        <label class="upload-box" for="fileInput">
            <span id="uploadText">📁 এখানে ক্লিক করে ছবি আপলোড করুন</span>
            <input type="file" name="image" id="fileInput" accept="image/*" required>
        </label>
        <button type="submit">Remove Background (High Quality)</button>
    </form>
    <div id="loading">⏳ এআই ছবি প্রসেস করছে, অনুগ্রহ করে অপেক্ষা করুন...</div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const uploadText = document.getElementById('uploadText');
    const form = document.getElementById('uploadForm');
    const loading = document.getElementById('loading');

    fileInput.addEventListener('change', function() {
        if(this.files.length > 0) {
            uploadText.innerText = "✓ " + this.files[0].name;
        }
    });

    form.addEventListener('submit', function() {
        loading.style.display = 'block';
    });
</script>

</body>
</html>
